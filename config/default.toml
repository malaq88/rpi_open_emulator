[retroarch]
binary_path = "/usr/bin/retroarch"
cores_dir = "/usr/lib/libretro"
extra_args = ["--verbose"]

[library]
# ROMs: uma subpasta por sistema, ex. <roms_dir>/nes/, <roms_dir>/snes/
roms_dir = "/home/malack/pi/ROMs"
# BIOS: uma subpasta por sistema, ex. <bios_dir>/gba/ — o launcher passa isto ao RetroArch como system_directory
bios_dir = "/home/malack/pi/BIOS"

[systems.nes]
default_core = "nestopia_libretro.so"
accepted_extensions = ["nes"]
extra_args = []

[systems.snes]
default_core = "snes9x_libretro.so"
accepted_extensions = ["sfc", "smc"]
extra_args = []

[systems.gba]
default_core = "mgba_libretro.so"
accepted_extensions = ["gba"]
extra_args = []
